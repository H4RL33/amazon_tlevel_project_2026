name: Release Frontend

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions: {}

concurrency:
  group: release-main-push
  cancel-in-progress: false

jobs:
  release:
    name: Release
    if: |
      github.event.pull_request.merged == true && (
        contains(github.event.pull_request.labels.*.name, 'bump-frontend:patch') ||
        contains(github.event.pull_request.labels.*.name, 'bump-frontend:minor') ||
        contains(github.event.pull_request.labels.*.name, 'bump-frontend:major')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # actions/checkout pins to the SHA that triggered this run, not the live
      # tip of main. The concurrency group only serializes job execution — it
      # doesn't stop this job from basing its commit on a now-stale checkout
      # if a sibling release job already pushed to main while this one was
      # queued. Reset to the current remote tip before reading/bumping VERSION.
      - name: Sync with latest main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Determine bump type
        id: bump
        run: |
          if [[ "${{ contains(github.event.pull_request.labels.*.name, 'bump-frontend:major') }}" == "true" ]]; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif [[ "${{ contains(github.event.pull_request.labels.*.name, 'bump-frontend:minor') }}" == "true" ]]; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Bump version
        id: version
        run: |
          current=$(cat frontend/VERSION)
          IFS='.' read -r major minor patch <<< "$current"
          case "${{ steps.bump.outputs.type }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          new="$major.$minor.$patch"
          echo "$new" > frontend/VERSION
          echo "new=$new" >> $GITHUB_OUTPUT

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/VERSION
          git commit -m "chore: bump frontend to v${{ steps.version.outputs.new }} [skip ci]"
          git tag -a "frontend-v${{ steps.version.outputs.new }}" -m "frontend-v${{ steps.version.outputs.new }}"
          git push origin main --follow-tags

      - name: Set lowercase image name
        id: image
        run: echo "name=$(echo 'ghcr.io/${{ github.repository }}-frontend' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
            VITE_COGNITO_DOMAIN=${{ vars.VITE_COGNITO_DOMAIN }}
            VITE_COGNITO_CLIENT_ID=${{ vars.VITE_COGNITO_CLIENT_ID }}
            VITE_COGNITO_REDIRECT_URI=${{ vars.VITE_COGNITO_REDIRECT_URI }}
          tags: |
            ${{ steps.image.outputs.name }}:v${{ steps.version.outputs.new }}
            ${{ steps.image.outputs.name }}:latest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_DEPLOY_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_DEPLOY_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      # The ECS task definition's image tag is the mutable `:latest`, so
      # forcing a new deployment makes ECS re-pull the image we just pushed.
      - name: Redeploy frontend ECS service
        run: aws ecs update-service --cluster prod-cluster --service frontend --force-new-deployment
