name: Backend

on:
  push:
    branches: [main]
    paths: ['backend/**']
  pull_request:
    paths: ['backend/**']

# Cancel any in-progress run for the same branch when a new push arrives.
# Prevents concurrent autofix commits racing to push to the same ref.
concurrency:
  group: backend-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions: {}

jobs:
  lint-autofix:
    name: Lint & Autofix
    runs-on: ubuntu-latest
    permissions:
      contents: write      # allows autofix commit-back on PRs
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          # On PRs, check out the actual branch so we can commit back
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Autofix — ruff check
        run: ruff check --fix backend/ || true

      - name: Autofix — ruff format
        run: ruff format backend/ || true

      - name: Commit autofixes (PRs only)
        if: github.event_name == 'pull_request'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'style: autofix Python linting [skip ci]'
          file_pattern: 'backend/**/*.py'

      - name: Report remaining warnings
        run: ruff check backend/ --output-format=github || true

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint-autofix
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        run: pytest backend/tests/ -v --tb=short

  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    # Only build/push the image on main — not on PRs
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
    outputs:
      image-uri: ${{ steps.push.outputs.image-uri }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG backend/
          docker push $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG
          echo "image-uri=$ECR_REGISTRY/${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to App Runner
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy new image to App Runner
        id: start-deploy
        run: |
          DEPLOYMENT_ID=$(aws apprunner start-deployment \
            --service-arn ${{ secrets.APP_RUNNER_SERVICE_ARN }} \
            --query 'OperationId' --output text)
          echo "deployment-id=$DEPLOYMENT_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for deployment to succeed
        run: |
          aws apprunner wait deployment-succeeded \
            --service-arn ${{ secrets.APP_RUNNER_SERVICE_ARN }} \
            --operation-id ${{ steps.start-deploy.outputs.deployment-id }}
          echo "Backend deployed successfully."
