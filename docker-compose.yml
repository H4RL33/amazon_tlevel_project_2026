services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      # Mount only source dirs so the Poetry .venv built into the image is preserved.
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
    env_file: ./backend/.env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
        # Cognito domain/client ID are intentionally blank for local dev — there's no
        # local Cognito mock, so "Log in with Cognito" is a no-op here by design.
        # Test the real login flow against the deployed environment instead.
        VITE_COGNITO_DOMAIN: ""
        VITE_COGNITO_CLIENT_ID: ""
        VITE_COGNITO_REDIRECT_URI: http://localhost:3000/auth/callback
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
